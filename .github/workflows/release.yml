name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: vendor/build/siso/go.mod
          cache-dependency-path: vendor/build/siso/go.sum

      - name: Apply patches
        run: script/apply-patches

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: script/build

      - name: Checksum
        run: |
          cd out
          sha256sum siso-${{ matrix.goos }}-${{ matrix.goarch }}* > siso-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: |
            out/siso-${{ matrix.goos }}-${{ matrix.goarch }}*
